name: Build and test MotionFX

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows-vst3:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S MotionFX_source -B build -G "Visual Studio 17 2022" -A x64
      - name: Build VST3 and tests
        run: cmake --build build --config Release --target MotionFX_VST3 MotionFXAudioTest MotionFXGuiTest
      - name: Run audio integrity test
        run: .\build\Release\MotionFXAudioTest.exe
      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: MotionFX-Windows-VST3
          path: build/MotionFX_artefacts/Release/VST3/MotionFX.vst3

  linux-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install JUCE dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libasound2-dev libjack-jackd2-dev \
            ladspa-sdk libcurl4-openssl-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev \
            libxrandr-dev libxrender-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev xvfb
      - name: Configure
        run: cmake -S MotionFX_source -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target MotionFX_VST3 MotionFXAudioTest MotionFXGuiTest
      - name: Run audio integrity test
        run: ./build/MotionFXAudioTest
      - name: List built files
        run: find build -maxdepth 4 -type f | sort
      - name: Run GUI resize test
        run: xvfb-run -a ./build/MotionFXGuiTest_artefacts/MotionFXGuiTest
